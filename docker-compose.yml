services:
  taoyuan:
    build:
      context: .
      dockerfile: Dockerfile.repack
    image: taoyuan-duli:latest
    container_name: taoyuan
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_STORAGE: /app/data/.storage.json
    ports:
      - "${HOST_PORT:-4014}:4013"
    volumes:
      - ./data:/app/data
